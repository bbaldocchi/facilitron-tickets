<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facilitron Tickets - Master Template QA Checklist</title>
<style>
  :root {
    --navy: #132238;
    --tron: #00b4d8;
    --tron-light: #e0f7fc;
    --violet: #5b2b82;
    --violet-light: #f3eef8;
    --sand: #f5f0e8;
    --sand-dark: #e8dfc9;
    --white: #ffffff;
    --gray-1: #f8f9fa;
    --gray-2: #e9ecef;
    --gray-3: #ced4da;
    --gray-4: #868e96;
    --gray-5: #343a40;
    --pass: #1a9e6b;
    --pass-light: #e6f7f1;
    --fail: #d9363e;
    --fail-light: #fdedef;
    --warn: #e07b00;
    --warn-light: #fff3e0;
    --na: #868e96;
    --na-light: #f1f3f5;
    --radius: 8px;
    --radius-sm: 4px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--gray-1);
    color: var(--gray-5);
    font-size: 14px;
    line-height: 1.5;
  }

  /* TOP BAR */
  .topbar {
    background: var(--navy);
    color: var(--white);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar-logo {
    width: 24px;
    height: 24px;
    background: var(--tron);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.5px;
  }
  .topbar-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.01em;
  }
  .topbar-subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--white);
    min-width: 100px;
    text-align: center;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: var(--radius-sm);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover {
    background: rgba(255,255,255,0.1);
    color: var(--white);
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--gray-2);
    padding: 20px 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-4);
    padding: 0 16px 8px;
    margin-top: 16px;
  }
  .sidebar-section-label:first-child { margin-top: 0; }
  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 3px solid transparent;
    text-decoration: none;
    color: var(--gray-5);
  }
  .sidebar-nav-item:hover {
    background: var(--gray-1);
  }
  .sidebar-nav-item.active {
    background: var(--tron-light);
    border-left-color: var(--tron);
    color: var(--navy);
    font-weight: 600;
  }
  .sidebar-nav-item .nav-label {
    font-size: 13px;
    flex: 1;
  }
  .sidebar-nav-item .nav-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    background: var(--gray-2);
    color: var(--gray-4);
    min-width: 24px;
    text-align: center;
  }
  .sidebar-nav-item .nav-badge.has-fail {
    background: var(--fail-light);
    color: var(--fail);
  }
  .sidebar-nav-item .nav-badge.all-pass {
    background: var(--pass-light);
    color: var(--pass);
  }

  /* MAIN */
  .main {
    padding: 24px;
    max-width: 860px;
  }

  /* SESSION HEADER */
  .session-header {
    background: var(--white);
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .session-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .session-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-4);
  }
  .session-input {
    border: 1px solid var(--gray-3);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 13px;
    color: var(--gray-5);
    background: var(--white);
    min-width: 160px;
    outline: none;
  }
  .session-input:focus {
    border-color: var(--tron);
  }

  /* SECTION */
  .qa-section {
    margin-bottom: 32px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .section-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--navy);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
  }
  .section-count {
    font-size: 12px;
    color: var(--gray-4);
    margin-left: auto;
  }

  /* CHECKLIST TABLE */
  .checklist {
    background: var(--white);
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .checklist-row {
    display: grid;
    grid-template-columns: 1fr 160px 120px;
    border-bottom: 1px solid var(--gray-2);
    transition: background 0.1s;
  }
  .checklist-row:last-child { border-bottom: none; }
  .checklist-row:hover { background: var(--gray-1); }
  .checklist-row.status-pass { border-left: 3px solid var(--pass); }
  .checklist-row.status-fail { border-left: 3px solid var(--fail); }
  .checklist-row.status-warn { border-left: 3px solid var(--warn); }
  .checklist-row.status-na { border-left: 3px solid var(--gray-3); opacity: 0.65; }

  .col-item {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .item-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-5);
  }
  .item-hint {
    font-size: 11px;
    color: var(--gray-4);
    line-height: 1.4;
  }
  .item-breakpoint {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--navy);
    color: var(--white);
    letter-spacing: 0.04em;
    margin-top: 2px;
    width: fit-content;
  }
  .item-breakpoint.bp-mobile { background: var(--violet); }
  .item-breakpoint.bp-tablet { background: var(--tron); color: var(--navy); }
  .item-breakpoint.bp-desktop { background: var(--navy); }
  .item-breakpoint.bp-all { background: var(--gray-4); }

  .col-notes {
    padding: 10px 12px;
    border-left: 1px solid var(--gray-2);
  }
  .notes-input {
    width: 100%;
    height: 100%;
    min-height: 38px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 12px;
    color: var(--gray-5);
    resize: none;
    font-family: inherit;
    line-height: 1.4;
  }
  .notes-input::placeholder { color: var(--gray-3); }

  .col-status {
    padding: 10px 12px;
    border-left: 1px solid var(--gray-2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .status-btn {
    width: 26px;
    height: 26px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gray-3);
    background: var(--white);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .status-btn:hover { transform: scale(1.1); }
  .status-btn.btn-pass { color: var(--gray-4); }
  .status-btn.btn-pass.selected { background: var(--pass); border-color: var(--pass); color: var(--white); }
  .status-btn.btn-fail { color: var(--gray-4); }
  .status-btn.btn-fail.selected { background: var(--fail); border-color: var(--fail); color: var(--white); }
  .status-btn.btn-na { color: var(--gray-4); font-size: 10px; }
  .status-btn.btn-na.selected { background: var(--gray-3); border-color: var(--gray-3); color: var(--white); }

  /* COLUMN HEADERS */
  .checklist-header {
    display: grid;
    grid-template-columns: 1fr 160px 120px;
    background: var(--navy);
    color: rgba(255,255,255,0.7);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .checklist-header > div {
    padding: 8px 16px;
  }
  .checklist-header > div + div {
    border-left: 1px solid rgba(255,255,255,0.1);
    text-align: center;
  }

  /* SUMMARY PANEL */
  .summary-bar {
    background: var(--white);
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .summary-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 56px;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-num.c-pass { color: var(--pass); }
  .stat-num.c-fail { color: var(--fail); }
  .stat-num.c-warn { color: var(--warn); }
  .stat-num.c-total { color: var(--navy); }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gray-4);
    font-weight: 600;
  }
  .summary-divider {
    width: 1px;
    height: 36px;
    background: var(--gray-2);
  }
  .progress-bar-wrap {
    flex: 1;
    min-width: 120px;
  }
  .progress-bar-track {
    height: 8px;
    background: var(--gray-2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--tron), var(--pass));
    border-radius: 99px;
    transition: width 0.3s ease;
  }
  .progress-pct {
    font-size: 12px;
    color: var(--gray-4);
    margin-top: 4px;
  }
  .btn-export {
    margin-left: auto;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-export:hover { background: #1d3557; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">FT</div>
    <div>
      <div class="topbar-title">Facilitron Tickets - Master Template QA</div>
      <div class="topbar-subtitle">Regression Checklist</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="progress-pill" id="topbar-progress">0 / 0 checked</div>
    <button class="btn-reset" onclick="resetAll()">Reset All</button>
  </div>
</div>

<div class="layout">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Sections</div>
  </nav>

  <div class="main">

    <!-- SESSION INFO -->
    <div class="session-header">
      <div class="session-field">
        <span class="session-label">Tester Name</span>
        <input class="session-input" id="field-tester" type="text" placeholder="Your name">
      </div>
      <div class="session-field">
        <span class="session-label">Client / Instance</span>
        <input class="session-input" id="field-client" type="text" placeholder="e.g. Upper Darby SD">
      </div>
      <div class="session-field">
        <span class="session-label">Date</span>
        <input class="session-input" id="field-date" type="date">
      </div>
      <div class="session-field">
        <span class="session-label">Template Version</span>
        <input class="session-input" id="field-version" type="text" placeholder="e.g. v1.0">
      </div>
    </div>

    <!-- SUMMARY BAR -->
    <div class="summary-bar">
      <div class="summary-stat">
        <span class="stat-num c-total" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <span class="stat-num c-pass" id="stat-pass">0</span>
        <span class="stat-label">Pass</span>
      </div>
      <div class="summary-stat">
        <span class="stat-num c-fail" id="stat-fail">0</span>
        <span class="stat-label">Fail</span>
      </div>
      <div class="summary-divider"></div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-pct" id="progress-pct">0% complete</div>
      </div>
      <button class="btn-export" onclick="exportReport()">Export Report</button>
    </div>

    <!-- CHECKLIST CONTENT -->
    <div id="checklist-root"></div>

  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const SECTIONS = [
  {

    items: [
      { label: "Facilitron logo renders correctly", hint: "Check src URL and display size in header", bp: "all" },

      { label: "Navy (#132238) used for header and text", hint: "Header bar and headings should be navy not black", bp: "all" },

// ============================================================
// STATE
// ============================================================
let state = {}; // key: sectionId-itemIndex, value: {status, notes}

function getKey(sectionId, itemIndex) {
  return sectionId + "-" + itemIndex;
}

function saveState() {
  try {
    const sessionData = {
      tester: document.getElementById("field-tester").value,
      client: document.getElementById("field-client").value,
      date: document.getElementById("field-date").value,
      version: document.getElementById("field-version").value,
      checks: state
    };
    localStorage.setItem("ftix-qa-state", JSON.stringify(sessionData));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem("ftix-qa-state");
    if (!raw) return;
    const data = JSON.parse(raw);
    state = data.checks || {};
    if (data.tester) document.getElementById("field-tester").value = data.tester;
    if (data.client) document.getElementById("field-client").value = data.client;
    if (data.date) document.getElementById("field-date").value = data.date;
    if (data.version) document.getElementById("field-version").value = data.version;
  } catch(e) {}
}

function resetAll() {
  if (!confirm("Reset all checklist data? This cannot be undone.")) return;
  state = {};
  try { localStorage.removeItem("ftix-qa-state"); } catch(e) {}
  renderAll();
  updateSummary();
}

// ============================================================
// RENDER
// ============================================================
function bpClass(bp) {
  if (bp === "mobile") return "bp-mobile";
  if (bp === "tablet") return "bp-tablet";
  if (bp === "desktop") return "bp-desktop";
  return "bp-all";
}

function bpLabel(bp) {
  if (bp === "mobile") return "Mobile";
  if (bp === "tablet") return "Tablet";
  if (bp === "desktop") return "Desktop";
  return "All";
}

function renderSection(section) {
  const key0 = getKey(section.id, 0);
  const wrapper = document.createElement("div");
  wrapper.className = "qa-section";
  wrapper.id = "section-" + section.id;

  const header = document.createElement("div");
  header.className = "section-header";
  header.innerHTML =
    '<div class="section-icon">' + section.icon + '</div>' +
    '<div class="section-title">' + section.title + '</div>' +
    '<div class="section-count" id="count-' + section.id + '">' + section.items.length + ' items</div>';
  wrapper.appendChild(header);

  const table = document.createElement("div");
  table.className = "checklist";

  // header row
  const hrow = document.createElement("div");
  hrow.className = "checklist-header";
  hrow.innerHTML =
    '<div>Check Item</div>' +
    '<div>Notes</div>' +
    '<div>Status</div>';
  table.appendChild(hrow);

  section.items.forEach(function(item, idx) {
    const k = getKey(section.id, idx);
    const s = state[k] || { status: null, notes: "" };

    const row = document.createElement("div");
    row.className = "checklist-row" + (s.status ? " status-" + s.status : "");
    row.id = "row-" + k;

    // item col
    const colItem = document.createElement("div");
    colItem.className = "col-item";
    colItem.innerHTML =
      '<div class="item-label">' + item.label + '</div>' +
      '<div class="item-hint">' + item.hint + '</div>' +
      '<span class="item-breakpoint ' + bpClass(item.bp) + '">' + bpLabel(item.bp) + '</span>';
    row.appendChild(colItem);

    // notes col
    const colNotes = document.createElement("div");
    colNotes.className = "col-notes";
    const ta = document.createElement("textarea");
    ta.className = "notes-input";
    ta.placeholder = "Add note...";
    ta.value = s.notes || "";
    ta.addEventListener("input", function() {
      if (!state[k]) state[k] = { status: null, notes: "" };
      state[k].notes = ta.value;
      saveState();
    });
    colNotes.appendChild(ta);
    row.appendChild(colNotes);

    // status col
    const colStatus = document.createElement("div");
    colStatus.className = "col-status";

    const btnP = document.createElement("button");
    btnP.className = "status-btn btn-pass" + (s.status === "pass" ? " selected" : "");
    btnP.title = "Pass";
    btnP.textContent = "P";
    btnP.addEventListener("click", function() { setStatus(section.id, idx, "pass"); });

    const btnF = document.createElement("button");
    btnF.className = "status-btn btn-fail" + (s.status === "fail" ? " selected" : "");
    btnF.title = "Fail";
    btnF.textContent = "F";
    btnF.addEventListener("click", function() { setStatus(section.id, idx, "fail"); });

    const btnN = document.createElement("button");
    btnN.className = "status-btn btn-na" + (s.status === "na" ? " selected" : "");
    btnN.title = "N/A";
    btnN.textContent = "N/A";
    btnN.addEventListener("click", function() { setStatus(section.id, idx, "na"); });

    colStatus.appendChild(btnP);
    colStatus.appendChild(btnF);
    colStatus.appendChild(btnN);
    row.appendChild(colStatus);

    table.appendChild(row);
  });

  wrapper.appendChild(table);
  return wrapper;
}

function setStatus(sectionId, itemIndex, status) {
  const k = getKey(sectionId, itemIndex);
  if (!state[k]) state[k] = { status: null, notes: "" };

  // toggle off if clicking same status
  if (state[k].status === status) {
    state[k].status = null;
  } else {
    state[k].status = status;
  }

  // re-render that row
  const row = document.getElementById("row-" + k);
  const s = state[k];
  row.className = "checklist-row" + (s.status ? " status-" + s.status : "");

  const btns = row.querySelectorAll(".status-btn");
  btns[0].className = "status-btn btn-pass" + (s.status === "pass" ? " selected" : "");
  btns[1].className = "status-btn btn-fail" + (s.status === "fail" ? " selected" : "");
  btns[2].className = "status-btn btn-na" + (s.status === "na" ? " selected" : "");

  saveState();
  updateSummary();
  updateSidebarBadge(sectionId);
}

function renderAll() {
  const root = document.getElementById("checklist-root");
  root.innerHTML = "";
  SECTIONS.forEach(function(section) {
    root.appendChild(renderSection(section));
  });
  renderSidebar();
  updateSummary();
}

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = '<div class="sidebar-section-label">Sections</div>';
  SECTIONS.forEach(function(section) {
    const item = document.createElement("a");
    item.className = "sidebar-nav-item";
    item.href = "#section-" + section.id;
    item.innerHTML =
      '<span class="nav-label">' + section.title + '</span>' +
      '<span class="nav-badge" id="badge-' + section.id + '">' + section.items.length + '</span>';
    sidebar.appendChild(item);
  });
}

function updateSidebarBadge(sectionId) {
  const section = SECTIONS.find(function(s) { return s.id === sectionId; });
  if (!section) return;
  const badge = document.getElementById("badge-" + sectionId);
  if (!badge) return;

  let pass = 0, fail = 0, done = 0;
  section.items.forEach(function(item, idx) {
    const k = getKey(sectionId, idx);
    const s = state[k];
    if (s && s.status) {
      done++;
      if (s.status === "pass") pass++;
      if (s.status === "fail") fail++;
    }
  });

  if (fail > 0) {
    badge.className = "nav-badge has-fail";
    badge.textContent = fail + " fail";
  } else if (done === section.items.length) {
    badge.className = "nav-badge all-pass";
    badge.textContent = "done";
  } else {
    badge.className = "nav-badge";
    badge.textContent = done + "/" + section.items.length;
  }
}

function updateSummary() {
  let total = 0, pass = 0, fail = 0, done = 0;
  SECTIONS.forEach(function(section) {
    section.items.forEach(function(item, idx) {
      total++;
      const k = getKey(section.id, idx);
      const s = state[k];
      if (s && s.status) {
        done++;
        if (s.status === "pass") pass++;
        if (s.status === "fail") fail++;
      }
    });
  });

  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-pass").textContent = pass;
  document.getElementById("stat-fail").textContent = fail;

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "% complete";
  document.getElementById("topbar-progress").textContent = done + " / " + total + " checked";

  SECTIONS.forEach(function(section) {
    updateSidebarBadge(section.id);
  });
}

// ============================================================
// EXPORT
// ============================================================
function exportReport() {
  const tester = document.getElementById("field-tester").value || "Unknown";
  const client = document.getElementById("field-client").value || "Unknown";
  const date = document.getElementById("field-date").value || new Date().toISOString().slice(0,10);
  const version = document.getElementById("field-version").value || "N/A";

  let lines = [];
  lines.push("FACILITRON TICKETS - MASTER TEMPLATE QA REPORT");
  lines.push("================================================");
  lines.push("Tester: " + tester);
  lines.push("Client: " + client);
  lines.push("Date: " + date);
  lines.push("Version: " + version);
  lines.push("");

  let total = 0, pass = 0, fail = 0, na = 0;
  SECTIONS.forEach(function(section) {
    section.items.forEach(function(item, idx) {
      total++;
      const s = state[getKey(section.id, idx)];
      if (s && s.status === "pass") pass++;
      if (s && s.status === "fail") fail++;
      if (s && s.status === "na") na++;
    });
  });

  lines.push("SUMMARY");
  lines.push("-------");
  lines.push("Total Items: " + total);
  lines.push("Pass: " + pass);
  lines.push("Fail: " + fail);
  lines.push("N/A: " + na);
  lines.push("Unchecked: " + (total - pass - fail - na));
  lines.push("");

  SECTIONS.forEach(function(section) {
    lines.push("--- " + section.title.toUpperCase() + " ---");
    section.items.forEach(function(item, idx) {
      const s = state[getKey(section.id, idx)] || {};
      const status = s.status ? s.status.toUpperCase() : "UNCHECKED";
      const notes = s.notes ? " | Notes: " + s.notes : "";
      lines.push("[" + status + "] " + item.label + notes);
    });
    lines.push("");
  });

  const blob = new Blob([lines.join("\n")], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "facilitron-qa-" + client.replace(/\s+/g, "-").toLowerCase() + "-" + date + ".txt";
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// INIT
// ============================================================
document.getElementById("field-date").value = new Date().toISOString().slice(0,10);
loadState();
renderAll();

// auto-save session fields
["field-tester","field-client","field-date","field-version"].forEach(function(id) {
  document.getElementById(id).addEventListener("input", saveState);
});
</script>
